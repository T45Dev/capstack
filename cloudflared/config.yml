# Cloudflare Tunnel ingress for CapStack / Pariva.
#
# This file is version-controlled so the hostname -> service mapping lives in
# the repo. The tunnel CREDENTIALS (credentials.json) are a secret and are
# gitignored — see cloudflared/README.md for the one-time setup on the host.
#
# `tunnel:` may be the tunnel NAME or its UUID. Keep it in sync with the
# credentials file you place next to this config.
tunnel: capstack
credentials-file: /etc/cloudflared/credentials.json

# Don't auto-update the binary inside the container; we pin the image instead.
no-autoupdate: true

ingress:
  # Public hostname for the app. Routes to the capstack service on the
  # compose network (service name `capstack`, internal port 3100).
  - hostname: pariva.t45labs.com
    service: http://capstack:3100

  # Catch-all: anything not matched above gets a 404 instead of being proxied.
  - service: http_status:404
